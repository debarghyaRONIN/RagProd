server {
    listen 80;
    server_name localhost;

    # Dynamic reverse proxy configuration for development & production environments
    location /api/ {
        # Rewrite "/api/sessions/..." to "/sessions/..." and forward to the FastAPI container
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8080;
        
        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configure SSE and proxy streaming options (prevent buffering)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        
        # Custom header to disable buffering in Nginx proxies down the line
        proxy_set_header X-Accel-Buffering no;
    }

    location / {
        # Forward UI page requests and static assets to the Next.js web application
        proxy_pass http://frontend:3000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable WebSockets for hot module reloading in development
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
